spring:
  application:
    name: rain-ai-code-mother-backend
  profiles:
    active: local
  #mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/rain_ai_code_mother?serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: abc123
  # session 配置
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
  # redis
#  data:
#    redis:
#      host: localhost
#      port: 6379
#      password:
#      ttl: 3600

server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: cloud.raina.rainaicodemother.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

